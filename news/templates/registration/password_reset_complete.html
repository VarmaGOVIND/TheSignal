{% extends 'news/base.html' %}
{% block title %}Password Changed — The Signal{% endblock %}
{% block content %}
<div style="max-width:400px; margin:60px auto; padding:24px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; text-align:center;">
  <div style="font-size:40px; margin-bottom:10px;">✅</div>
  <h2 style="font-family:Georgia,serif; font-size:22px; color:var(--accent); margin-bottom:10px;">Password Changed!</h2>
  <p style="font-size:13px; color:var(--text-sub); margin-bottom:20px;">Your password has been set. You can now log in with your new password.</p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-full">Log In</a>
</div>
{% endblock %}
