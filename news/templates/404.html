<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | The Signal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0b;
            color: #f0ede6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #47c8ff;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(71, 200, 255, 0.3);
        }
        
        .error-title {
            font-family: Georgia, serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #f0ede6;
        }
        
        .error-message {
            font-size: 16px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .home-button {
            display: inline-block;
            padding: 14px 32px;
            background: #47c8ff;
            color: #0a0a0b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .home-button:hover {
            background: #5ad0ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(71, 200, 255, 0.3);
        }
        
        .logo {
            font-family: Georgia, serif;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 40px;
            color: #f0ede6;
        }
        
        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }
            .error-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">THE SIGNAL</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you were looking for doesn't exist.<br>
            The link you have followed may be broken, or the page may have been removed.
        </p>
        <a href="/" class="home-button">← Back to Home</a>
    </div>
</body>
</html>
