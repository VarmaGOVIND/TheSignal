{% extends 'news/base.html' %}
{% block title %}Unsubscribed — The Signal{% endblock %}

{% block content %}
<div style="max-width:600px;margin:80px auto;text-align:center;padding:40px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;">
  <div style="font-size:64px;margin-bottom:20px;">📧</div>
  <h1 style="font-family:Georgia,serif;font-size:28px;color:var(--accent);margin-bottom:16px;">
    You've Been Unsubscribed
  </h1>
  <p style="font-size:14px;color:var(--text-sub);line-height:1.6;margin-bottom:24px;">
    You will no longer receive our Daily Briefing emails. 
    We're sorry to see you go!
  </p>
  <p style="font-size:12px;color:var(--text-muted);margin-bottom:24px;">
    Changed your mind? <a href="{% url 'home' %}" style="color:var(--accent);">Subscribe again</a>
  </p>
  <a href="{% url 'home' %}" class="btn btn-primary">← Back to Homepage</a>
</div>
{% endblock %}
