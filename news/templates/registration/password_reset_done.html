{% extends 'news/base.html' %}
{% block title %}Reset Link Sent — The Signal{% endblock %}
{% block content %}
<div style="max-width:400px; margin:60px auto; padding:24px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; text-align:center;">
  <div style="font-size:40px; margin-bottom:10px;">📧</div>
  <h2 style="font-family:Georgia,serif; font-size:22px; color:var(--accent); margin-bottom:10px;">Check your inbox!</h2>
  <p style="font-size:13px; color:var(--text-sub); margin-bottom:20px;">We've emailed you instructions for setting your password. You should receive them shortly.</p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-full">Back to Login</a>
</div>
{% endblock %}
