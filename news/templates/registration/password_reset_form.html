{% extends 'news/base.html' %}
{% block title %}Forgot Password — The Signal{% endblock %}
{% block content %}
<div style="max-width:400px; margin:60px auto; padding:24px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px;">
  <h2 style="font-family:Georgia,serif; font-size:24px; color:var(--accent); margin-bottom:16px; text-align:center;">Forgot Password?</h2>
  <p style="font-size:13px; color:var(--text-sub); margin-bottom:20px; text-align:center;">Enter your email address and we'll send you a link to reset your password.</p>
  
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-input" required placeholder="your@email.com">
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:10px;">Send Reset Link</button>
  </form>
  <div style="text-align:center; margin-top:16px;">
    <a href="{% url 'login' %}" style="font-size:12px; color:var(--text-muted);">← Back to Login</a>
  </div>
</div>
{% endblock %}
